<!DOCTYPE html>
<html>
<head>
<title>Pro Trading Dashboard</title>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

<style>
body { background:#020617; color:white; font-family:sans-serif; }

.top {
    padding:10px;
    display:flex;
    gap:10px;
    position:relative;
}

#dropdown {
    position:absolute;
    top:40px;
    width:250px;
    background:#111827;
    border-radius:8px;
    max-height:200px;
    overflow-y:auto;
    z-index:1000;
}

.dropdown-item {
    padding:8px;
    cursor:pointer;
}

.dropdown-item:hover {
    background:#1f2937;
}

.container { display:flex; }

.chart { flex:3; height:600px; }

.side { flex:1; padding:10px; }

.card {
    background:#111827;
    padding:10px;
    margin:10px;
    border-radius:10px;
}

.buy { color:#22c55e; }
.sell { color:#ef4444; }
</style>
</head>

<body>

<h2>📊 Pro Trading Dashboard</h2>

<div class="top">
    <input id="symbol" placeholder="Search stock..." onkeyup="searchStock()">
    <button onclick="load()">Load</button>
    <div id="dropdown"></div>
</div>

<div class="container">
    <div id="chart" class="chart"></div>

    <div class="side">
        <div class="card">
            <h3>Signal</h3>
            <p id="signal"></p>
            <p id="entry"></p>
            <p id="sl"></p>
            <p id="tp"></p>
        </div>
    </div>
</div>

<script>

// ==============================
// 🔹 CHART SETUP
// ==============================
let chart = LightweightCharts.createChart(document.getElementById('chart'), {
    layout: { background: { color: '#020617' }, textColor: '#DDD' },
    grid: { vertLines: { color: '#1f2937' }, horzLines: { color: '#1f2937' } }
});

let candleSeries = chart.addCandlestickSeries();

// ==============================
// 🔹 STOCK LIST
// ==============================
const stocks = [
    { name: "NIFTY 50", symbol: "NSE:NIFTY" },
    { name: "BANK NIFTY", symbol: "NSE:BANKNIFTY" },
    { name: "Reliance", symbol: "NSE:RELIANCE" },
    { name: "TCS", symbol: "NSE:TCS" },
    { name: "Infosys", symbol: "NSE:INFY" },

    { name: "Apple", symbol: "AAPL" },
    { name: "Tesla", symbol: "TSLA" },
    { name: "Microsoft", symbol: "MSFT" }
];

// ==============================
// 🔹 SEARCH
// ==============================
function searchStock() {
    let input = document.getElementById("symbol").value.toLowerCase();
    let dropdown = document.getElementById("dropdown");

    dropdown.innerHTML = "";

    if (!input) return;

    let results = stocks.filter(s =>
        s.name.toLowerCase().includes(input) ||
        s.symbol.toLowerCase().includes(input)
    );

    results.forEach(stock => {
        let div = document.createElement("div");
        div.className = "dropdown-item";
        div.innerText = stock.name + " (" + stock.symbol + ")";

        div.onclick = () => {
            document.getElementById("symbol").value = stock.symbol;
            dropdown.innerHTML = "";
        };

        dropdown.appendChild(div);
    });
}

// ==============================
// 🔹 SYMBOL FORMAT
// ==============================
function formatSymbol(input) {
    input = input.toUpperCase().trim();

    if (input.includes(":")) return input;

    if (input === "NIFTY") return "NSE:NIFTY";
    if (input === "BANKNIFTY") return "NSE:BANKNIFTY";

    const indianStocks = ["RELIANCE","TCS","INFY"];

    if (indianStocks.includes(input)) {
        return "NSE:" + input;
    }

    return input;
}

// ==============================
// 🔹 LOAD DATA
// ==============================
async function load() {

    let raw = document.getElementById("symbol").value;
    let symbol = formatSymbol(raw);

    if (!symbol) return;

    console.log("Loading:", symbol);

    document.getElementById("signal").innerText = "Loading...";

    try {

        // 🔹 Fetch candles
        let candleRes = await fetch("http://localhost:5000/candles/" + symbol);
        let candleData = await candleRes.json();

        console.log("Candles:", candleData);

        if (!candleData || !candleData.c) {
            alert("❌ No candle data (try AAPL)");
            return;
        }

        // 🔥 FIX TIME FORMAT (VERY IMPORTANT)
        let formatted = candleData.t.map((time, i) => ({
            time: Math.floor(time), // ensure correct format
            open: candleData.o[i],
            high: candleData.h[i],
            low: candleData.l[i],
            close: candleData.c[i]
        }));

        // 🔥 CLEAR OLD DATA
        chart.removeSeries(candleSeries);
        candleSeries = chart.addCandlestickSeries();

        candleSeries.setData(formatted);

        // 🔹 Draw FVG
        drawFVG(candleData);

        // 🔹 Fetch signal
        let res = await fetch("http://localhost:5000/prosignal/" + symbol);
        let data = await res.json();

        console.log("Signal:", data);

        let s = data.signal;

        let signalEl = document.getElementById("signal");

        signalEl.innerText = s.type || "NO SIGNAL";
        signalEl.className = "";

        if (s.type === "BUY") signalEl.classList.add("buy");
        if (s.type === "SELL") signalEl.classList.add("sell");

        document.getElementById("entry").innerText = "Entry: " + (s.entry || "-");
        document.getElementById("sl").innerText = "SL: " + (s.sl || "-");
        document.getElementById("tp").innerText = "TP: " + (s.tp || "-");

    } catch (err) {
        console.error(err);
        document.getElementById("signal").innerText = "ERROR";
    }
}
// ==============================
// 🔹 DRAW FVG
// ==============================
function drawFVG(data) {

    for (let i = 2; i < data.c.length; i++) {

        if (data.l[i] > data.h[i-2]) {
            let line = chart.addLineSeries({ color: 'green' });

            line.setData([
                { time: data.t[i-2], value: data.h[i-2] },
                { time: data.t[i], value: data.l[i] }
            ]);
        }

        if (data.h[i] < data.l[i-2]) {
            let line = chart.addLineSeries({ color: 'red' });

            line.setData([
                { time: data.t[i-2], value: data.l[i-2] },
                { time: data.t[i], value: data.h[i] }
            ]);
        }
    }
}

</script>

</body>
</html>

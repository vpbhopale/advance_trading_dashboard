<!DOCTYPE html>
<html>
<head>
<title>Pro Trading Dashboard (Yahoo Finance)</title>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

<style>
body { background:#020617; color:white; font-family:sans-serif; }

.top { padding:10px; display:flex; gap:10px; }

input, button {
    padding:8px;
    background:#111827;
    color:white;
    border:none;
    border-radius:5px;
}

.grid {
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:10px;
}

.chart { height:400px; }

.card {
    background:#111827;
    padding:10px;
    margin:10px;
    border-radius:10px;
}

.buy { color:#22c55e; }
.sell { color:#ef4444; }
</style>
</head>

<body>

<h2>📊 Trading Dashboard (Yahoo Finance)</h2>

<div class="top">
    <input id="symbol" placeholder="AAPL / RELIANCE / NIFTY">
    <button onclick="setTF('5')">5m</button>
    <button onclick="setTF('15')">15m</button>
    <button onclick="setTF('60')">1H</button>
    <button onclick="setTF('240')">4H</button>
    <button onclick="setTF('D')">1D</button>
    <button onclick="load()">Load</button>
</div>

<div class="grid">
    <div id="chart1" class="chart"></div>
    <div id="chart2" class="chart"></div>
</div>

<div class="card">
    <h3>Signal</h3>
    <p id="signal"></p>
    <p id="entry"></p>
    <p id="sl"></p>
    <p id="tp"></p>
</div>

<script>

let chart1 = LightweightCharts.createChart(document.getElementById('chart1'));
let chart2 = LightweightCharts.createChart(document.getElementById('chart2'));

let c1 = chart1.addCandlestickSeries();
let c2 = chart2.addCandlestickSeries();

let currentTF = "15";
let autoSignalInterval;

// =======================
// TIMEFRAME
// =======================
function setTF(tf){
    currentTF = tf;
    load();
}

// =======================
// LOAD DATA
// =======================
async function load(){

    let symbol = document.getElementById("symbol").value.toUpperCase();

    let res = await fetch(`http://localhost:5000/candles/${symbol}?tf=${currentTF}`);
    let data = await res.json();

    console.log("DATA:", data);

    if (!data || !data.t || data.t.length === 0) {
        alert("❌ No data");
        return;
    }

    let formatted = data.t.map((time,i)=>({
        time: time,
        open: data.o[i],
        high: data.h[i],
        low: data.l[i],
        close: data.c[i]
    }));

    c1.setData(formatted);
    c2.setData(formatted);

    startAutoSignal(symbol);
}

// =======================
// AUTO SIGNAL
// =======================
function startAutoSignal(symbol){

    if(autoSignalInterval) clearInterval(autoSignalInterval);

    autoSignalInterval = setInterval(async ()=>{

        let res = await fetch(`http://localhost:5000/prosignal/${symbol}`);
        let data = await res.json();

        let s = data.signal;

        let el = document.getElementById("signal");
        el.innerText = s.type;
        el.className = "";

        if(s.type==="BUY") el.classList.add("buy");
        if(s.type==="SELL") el.classList.add("sell");

        document.getElementById("entry").innerText = "Entry: "+(s.entry||"-");
        document.getElementById("sl").innerText = "SL: "+(s.sl||"-");
        document.getElementById("tp").innerText = "TP: "+(s.tp||"-");

    },10000);
}

</script>

</body>
</html>

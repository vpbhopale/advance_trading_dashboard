<!DOCTYPE html>
<html>
<head>
<title>Pro Trading Dashboard</title>

<style>
body { background:#020617; color:white; font-family:sans-serif; }
.top { padding:10px; background:#020617; display:flex; gap:10px; }
.container { display:flex; }
.main { flex:3; }
.side { flex:1; padding:10px; }
.card {
    background:#111827;
    margin:10px;
    padding:15px;
    border-radius:12px;
}
.buy { color:#22c55e; }
.sell { color:#ef4444; }
</style>

</head>

<body>

<div class="top">
<input id="symbol" placeholder="NSE:RELIANCE">
<button onclick="load()">Load</button>
</div>

<div class="container">

<div class="main">
<div id="chart"></div>
</div>

<div class="side">

<div class="card">
<h3>Trend</h3>
<p id="trend"></p>
</div>

<div class="card">
<h3>Signal</h3>
<p id="signal"></p>
<p id="entry"></p>
<p id="sl"></p>
<p id="tp"></p>
</div>

</div>

</div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>
function load() {
    let symbol = document.getElementById("symbol").value;

    new TradingView.widget({
        "container_id": "chart",
        "symbol": symbol,
        "interval": "15",
        "theme": "dark",
        "height": 600
    });

    fetch("http://localhost:5000/prosignal/" + symbol)
    .then(res => res.json())
    .then(data => {

        document.getElementById("trend").innerText = data.trend;

        let s = data.signal;

        document.getElementById("signal").innerText = s.type;
        document.getElementById("entry").innerText = "Entry: " + (s.entry || "-");
        document.getElementById("sl").innerText = "SL: " + (s.sl || "-");
        document.getElementById("tp").innerText = "TP: " + (s.tp || "-");

        if (s.type === "BUY") alert("BUY SETUP READY 🚀");
        if (s.type === "SELL") alert("SELL SETUP ⚠️");
    });
}
</script>

</body>
</html>

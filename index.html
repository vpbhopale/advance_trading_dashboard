<!DOCTYPE html>
<html>
<head>
<title>Pro Trading Dashboard MAX</title>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

<style>
body { background:#020617; color:white; font-family:sans-serif; }

.top { padding:10px; display:flex; gap:10px; }

input, button {
    padding:8px;
    background:#111827;
    color:white;
    border:none;
    border-radius:5px;
}

.grid {
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:10px;
}

.chart { height:400px; }

.card {
    background:#111827;
    padding:10px;
    margin:10px;
    border-radius:10px;
}

.buy { color:#22c55e; }
.sell { color:#ef4444; }
</style>
</head>

<body>

<h2>🚀 Pro Trading Dashboard MAX</h2>

<div class="top">
    <input id="symbol" placeholder="Search (AAPL / RELIANCE.NS)">
    <button onclick="setTF('5')">5m</button>
    <button onclick="setTF('15')">15m</button>
    <button onclick="setTF('60')">1H</button>
    <button onclick="setTF('240')">4H</button>
    <button onclick="setTF('D')">1D</button>
    <button onclick="load()">Load</button>
</div>

<div class="grid">
    <div id="chart1" class="chart"></div>
    <div id="chart2" class="chart"></div>
</div>

<div class="card">
    <h3>Signal</h3>
    <p id="signal"></p>
    <p id="entry"></p>
    <p id="sl"></p>
    <p id="tp"></p>
</div>

<script>

let API_KEY = "d736081r01qn7f07o1jgd736081r01qn7f07o1k0";

let chart1 = LightweightCharts.createChart(document.getElementById('chart1'));
let chart2 = LightweightCharts.createChart(document.getElementById('chart2'));

let c1 = chart1.addCandlestickSeries();
let c2 = chart2.addCandlestickSeries();

let currentTF = "15";
let socket, autoSignalInterval;

function setTF(tf){
    currentTF = tf;
    load();
}

// =======================
// LOAD DATA
// =======================
async function load(){

    let symbol = document.getElementById("symbol").value;

    let res = await fetch(`http://localhost:5000/candles/${symbol}?tf=${currentTF}`);
    let data = await res.json();

    let formatted = data.t.map((time,i)=>({
        time: time,
        open: data.o[i],
        high: data.h[i],
        low: data.l[i],
        close: data.c[i]
    }));

    c1.setData(formatted);
    c2.setData(formatted);

    startLive(symbol);
    startAutoSignal(symbol);
}

// =======================
// LIVE STREAM
// =======================
function startLive(symbol){

    if(socket) socket.close();

    socket = new WebSocket(`wss://ws.finnhub.io?token=${API_KEY}`);

    socket.onopen = () => {
        socket.send(JSON.stringify({ type:'subscribe', symbol }));
    };

    let currentCandle=null;

    socket.onmessage = (event)=>{
        let msg = JSON.parse(event.data);

        if(msg.type==="trade"){
            let price = msg.data[0].p;
            let time = Math.floor(msg.data[0].t/1000);

            let candleTime = Math.floor(time/60)*60;

            if(!currentCandle || currentCandle.time!==candleTime){
                currentCandle = {
                    time:candleTime,
                    open:price,
                    high:price,
                    low:price,
                    close:price
                };
            }else{
                currentCandle.high = Math.max(currentCandle.high,price);
                currentCandle.low = Math.min(currentCandle.low,price);
                currentCandle.close = price;
            }

            c1.update(currentCandle);
            c2.update(currentCandle);
        }
    };
}

// =======================
// AUTO SIGNAL
// =======================
function startAutoSignal(symbol){

    if(autoSignalInterval) clearInterval(autoSignalInterval);

    autoSignalInterval = setInterval(async ()=>{

        let res = await fetch(`http://localhost:5000/prosignal/${symbol}`);
        let data = await res.json();

        let s = data.signal;

        let el = document.getElementById("signal");
        el.innerText = s.type;
        el.className = "";

        if(s.type==="BUY") el.classList.add("buy");
        if(s.type==="SELL") el.classList.add("sell");

        document.getElementById("entry").innerText = "Entry: "+(s.entry||"-");
        document.getElementById("sl").innerText = "SL: "+(s.sl||"-");
        document.getElementById("tp").innerText = "TP: "+(s.tp||"-");

        if(s.type==="BUY" || s.type==="SELL"){
            new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play();
        }

    },5000);
}

</script>

</body>
</html>
